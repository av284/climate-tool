<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Risk Stress-Testing Tool</title>
    
    <!-- Load React and Recharts charting libraries directly from the web -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f7fafc; margin: 0; padding: 40px; color: #2d3748; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { margin-bottom: 25px; }
        .badge { font-size: 11px; text-transform: uppercase; color: #0070f3; font-weight: bold; letter-spacing: 1px; }
        .title { font-size: 28px; margin: 5px 0 10px 0; font-weight: 800; color: #1a202c; }
        .desc { color: #718096; font-size: 14px; line-height: 1.5; margin: 0; }
        .slider-card { background-color: #f7fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; }
        .slider { width: 100%; cursor: pointer; height: 6px; accent-color: #0070f3; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: #a0aec0; margin-top: 8px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { border: 1px solid #e2e8f0; padding: 18px; border-radius: 10px; background: white; }
        .stat-label { font-size: 11px; color: #718096; text-transform: uppercase; font-weight: bold; }
        .stat-value-bad { font-size: 28px; font-weight: bold; color: #e53e3e; margin-top: 5px; }
        .stat-value-neutral { font-size: 18px; font-weight: bold; color: #4a5568; margin-top: 10px; }
        .chart-container { height: 320px; margin-bottom: 30px; border: 1px solid #edf2f7; padding: 15px; border-radius: 8px; }
        .lesson-card { background-color: #ebf8ff; border-left: 4px solid #3182ce; padding: 18px; border-radius: 0 8px 8px 0; }
        .lesson-title { margin: 0 0 6px 0; color: #2b6cb0; font-size: 15px; font-weight: bold; }
        .lesson-text { margin: 0; font-size: 13.5px; line-height: 1.6; color: #2d3748; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // Portfolio holding data
        const portfolioData = [
          { ticker: "MSFT", name: "Microsoft", sector: "Technology", weight: 0.15, ebitda: 105000000000, emissions: 400000 },
          { ticker: "SU", name: "Suncor Energy", sector: "Energy", weight: 0.15, ebitda: 11000000000, emissions: 13900000 },
          { ticker: "AC", name: "Air Canada", sector: "Transportation", weight: 0.15, ebitda: 3000000000, emissions: 7500000 },
          { ticker: "NSRGY", name: "Nestlé", sector: "Consumer Goods", weight: 0.15, ebitda: 16000000000, emissions: 5200000 },
          { ticker: "CNR", name: "Canadian National", sector: "Transportation", weight: 0.15, ebitda: 6000000000, emissions: 5100000 },
          { ticker: "WMT", name: "Walmart", sector: "Retail", weight: 0.15, ebitda: 38000000000, emissions: 12000000 },
          { ticker: "TM", name: "Toyota", sector: "Automotive", weight: 0.10, ebitda: 45000000000, emissions: 5500000 }
        ];

        function ClimateApp() {
            const [carbonPrice, setCarbonPrice] = useState(0);

            const calculatePortfolioImpact = () => {
                let totalImpact = 0;
                portfolioData.forEach((company) => {
                    const carbonCost = company.emissions * carbonPrice;
                    const ebitdaImpactPct = (carbonCost / company.ebitda) * 100;
                    totalImpact += (ebitdaImpactPct * company.weight);
                });
                return totalImpact.toFixed(2);
            };

            const chartData = portfolioData.map((company) => {
                const carbonCost = company.emissions * carbonPrice;
                const postTaxEbitda = Math.max(0, company.ebitda - carbonCost);
                return {
                    name: company.ticker,
                    "Current EBITDA ($B)": (company.ebitda / 1e9).toFixed(2),
                    "Post-Tax EBITDA ($B)": (postTaxEbitda / 1e9).toFixed(2)
                };
            });

            return (
                <div class="container">
                    <div class="header">
                        <span class="badge">Sustainable Finance Lab</span>
                        <h1 class="title">Climate Risk & Stress-Testing Tool</h1>
                        <p class="desc">Simulating transition risk: Drag the slider to apply a carbon tax and observe how emissions profiles alter real corporate valuations.</p>
                    </div>

                    <div class="slider-card">
                        <div class="slider-header">
                            <span>Regulatory Carbon Tax Impact:</span>
                            <span style={{ color: '#0070f3', fontSize: '22px' }}>${carbonPrice} / tonne</span>
                        </div>
                        <input 
                            type="range" min="0" max="200" step="10" 
                            value={carbonPrice} 
                            onChange={(e) => setCarbonPrice(Number(e.target.value))} 
                            class="slider"
                        />
                        <div class="slider-labels">
                            <span>$0 (Baseline)</span>
                            <span>$50 (Global Floor)</span>
                            <span>$100 (Tightening)</span>
                            <span>$150 (Canada 2030 Mandate)</span>
                            <span>$200 (Net-Zero Shock)</span>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">Weighted Portfolio Profit Margin Drop</span>
                            <div class="stat-value-bad">-{calculatePortfolioImpact()}%</div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Highest Transition Risk Concentrations</span>
                            <div class="stat-value-neutral">Suncor (SU) & Air Canada (AC)</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart data={chartData}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                <XAxis dataKey="name" />
                                <YAxis />
                                <Tooltip />
                                <Legend />
                                <Bar dataKey="Current EBITDA ($B)" fill="#cbd5e0" />
                                <Bar dataKey="Post-Tax EBITDA ($B)" fill="#e53e3e" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>

                    <div class="lesson-card">
                        <h4 class="lesson-title">Sustainable Finance Integration Concept:</h4>
                        <p class="lesson-text">
                            Notice how <strong>Microsoft (MSFT)</strong>'s earnings bars remain practically identical even under a severe $200/tonne regulatory shock due to high asset efficiency. Conversely, asset-heavy carbon-exposed holdings like <strong>Suncor (SU)</strong> suffer immediate, systemic margin erosion. This directly proves why quantitative ESG integration is used to protect asset value and reallocate capital away from transition liabilities.
                        </p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClimateApp />);
    </script>
</body>
</html>
